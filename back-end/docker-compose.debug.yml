# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up --build
# Depois, no Cursor: Run and Debug → "Attach: FIFA League API (Docker)"
#
# Sem --reload: breakpoints ficam estaveis. O container ESPERA o debugger
# (--wait-for-client) antes de subir a API.

services:
  api:
    ports:
      - "8000:8000"
      - "5678:5678"
    command: >
      python -m debugpy --listen 0.0.0.0:5678 --wait-for-client
      -m uvicorn app.main:app --host 0.0.0.0 --port 8000
